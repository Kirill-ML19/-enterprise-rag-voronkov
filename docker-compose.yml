services: 
  qdrant:
    image: qdrant/qdrant:latest

    container_name: rag-qdrant

    ports:
      - "6333:6333"
      - "6334:6334"
    
    volumes:
      - qdrant_data:/qdrant/storage

    restart: unless-stopped

    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:6333/collections || exit 1' ]
      interval: 10s
      retries: 5
      start_period: 10s
      timeout: 5s

volumes:
  qdrant_data:  
